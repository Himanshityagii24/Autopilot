<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Autopilot</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
      --accent: #7fff6e; --accent2: #6edfff; --accent3: #ff6e9c;
      --text: #e8e8f0; --muted: #555570;
      --running: #ffcc4d; --done: #7fff6e; --failed: #ff6e9c; --queued: #6edfff;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(126,255,110,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(126,255,110,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
    header {
      padding: 24px 40px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.8);
      backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 36px; height: 36px; border: 2px solid var(--accent); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      box-shadow: 0 0 20px rgba(127,255,110,0.3); animation: pulse-border 3s ease-in-out infinite;
    }
    @keyframes pulse-border { 0%,100%{box-shadow:0 0 20px rgba(127,255,110,0.3)} 50%{box-shadow:0 0 40px rgba(127,255,110,0.6)} }
    .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .logo-text span { color: var(--accent); }
    .header-meta { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); display: flex; gap: 20px; align-items: center; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; margin-right: 6px; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    main { flex: 1; display: grid; grid-template-columns: 1fr 420px; grid-template-rows: auto 1fr; max-width: 1400px; width: 100%; margin: 0 auto; padding: 40px; gap: 24px; }
    .submit-panel { grid-column: 1/2; grid-row: 1/2; }
    .panel-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
    .goal-form { display: flex; gap: 12px; align-items: flex-start; }
    .goal-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 20px; font-family: 'Syne', sans-serif; font-size: 15px; color: var(--text);
      resize: none; min-height: 60px; transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    .goal-input::placeholder { color: var(--muted); }
    .goal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(127,255,110,0.1); }
    .submit-btn {
      background: var(--accent); color: #0a0a0f; border: none; border-radius: 12px;
      padding: 16px 28px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: all 0.2s; letter-spacing: 0.5px;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(127,255,110,0.3); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .stream-panel { grid-column: 1/2; grid-row: 2/3; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .stream-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 20px; min-height: 420px; max-height: 520px; overflow-y: auto;
      font-family: 'Space Mono', monospace; font-size: 12px;
    }
    .stream-box::-webkit-scrollbar { width: 4px; }
    .stream-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .stream-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 360px; color: var(--muted); gap: 12px; }
    .stream-empty-icon { font-size: 40px; opacity: 0.3; }
    .event { padding: 10px 14px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid transparent; animation: slide-in 0.3s ease; }
    @keyframes slide-in { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
    .event-planning  { border-color: var(--accent2); background: rgba(110,223,255,0.05); }
    .event-planned   { border-color: var(--accent2); background: rgba(110,223,255,0.05); }
    .event-running   { border-color: var(--running);  background: rgba(255,204,77,0.05); }
    .event-done      { border-color: var(--done);     background: rgba(127,255,110,0.05); }
    .event-failed    { border-color: var(--failed);   background: rgba(255,110,156,0.05); }
    .event-completed { border-color: var(--done);     background: rgba(127,255,110,0.08); }
    .event-cancelled { border-color: var(--muted);    background: rgba(85,85,112,0.1); }
    .event-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .event-tag { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; }
    .event-tag-running   { color: var(--running); }
    .event-tag-done      { color: var(--done); }
    .event-tag-failed    { color: var(--failed); }
    .event-tag-planning  { color: var(--accent2); }
    .event-tag-planned   { color: var(--accent2); }
    .event-tag-completed { color: var(--done); }
    .event-tag-cancelled { color: var(--muted); }
    .event-step { color: var(--muted); font-size: 10px; }
    .event-tool { color: var(--accent); font-weight: 700; }
    .event-input { color: var(--muted); margin-top: 2px; word-break: break-all; }
    .event-output { color: var(--text); margin-top: 6px; background: rgba(255,255,255,0.03); border-radius: 4px; padding: 6px 8px; max-height: 80px; overflow-y: auto; word-break: break-all; }
    .event-duration { color: var(--muted); font-size: 10px; }
    .event-message { color: var(--text); }
    .event-error { color: var(--failed); }
    .typing { display: flex; gap: 4px; align-items: center; padding: 10px 0; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.4; animation: typing-bounce 1.2s ease-in-out infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing-bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-6px);opacity:1} }
    .tasks-panel { grid-column: 2/3; grid-row: 1/3; }
    .tasks-list { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; max-height: 680px; overflow-y: auto; }
    .tasks-list::-webkit-scrollbar { width: 4px; }
    .tasks-list::-webkit-scrollbar-thumb { background: var(--border); }
    .tasks-empty { padding: 40px 20px; text-align: center; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 12px; }
    .task-item { padding: 16px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; animation: slide-in 0.3s ease; }
    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: rgba(255,255,255,0.02); }
    .task-item.active { background: rgba(127,255,110,0.05); border-left: 3px solid var(--accent); }
    .task-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .task-status-badge { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
    .badge-queued    { background: rgba(110,223,255,0.15); color: var(--queued); }
    .badge-planning  { background: rgba(110,223,255,0.15); color: var(--queued); }
    .badge-running   { background: rgba(255,204,77,0.15);  color: var(--running); }
    .badge-completed { background: rgba(127,255,110,0.15); color: var(--done); }
    .badge-failed    { background: rgba(255,110,156,0.15); color: var(--failed); }
    .badge-cancelled { background: rgba(85,85,112,0.15);   color: var(--muted); }
    .task-goal { font-size: 13px; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.5; }
    .task-meta { margin-top: 8px; font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); display: flex; gap: 12px; }
    .task-id-short { color: var(--accent); }
    .cancel-btn { background: rgba(255,110,156,0.1); color: var(--failed); border: 1px solid rgba(255,110,156,0.2); border-radius: 6px; padding: 3px 10px; font-family: 'Space Mono', monospace; font-size: 10px; cursor: pointer; transition: all 0.15s; }
    .cancel-btn:hover { background: rgba(255,110,156,0.2); }
    .steps-section { margin-top: 12px; }
    .step-row { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .step-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; flex-shrink: 0; }
    .step-num-running { background: rgba(255,204,77,0.2);  color: var(--running); border: 1px solid var(--running); }
    .step-num-done    { background: rgba(127,255,110,0.2); color: var(--done);    border: 1px solid var(--done); }
    .step-num-failed  { background: rgba(255,110,156,0.2); color: var(--failed);  border: 1px solid var(--failed); }
    .step-num-pending { background: rgba(85,85,112,0.2);   color: var(--muted);   border: 1px solid var(--muted); }
    .step-info { flex: 1; min-width: 0; }
    .step-tool { font-size: 12px; font-weight: 700; color: var(--accent); font-family: 'Space Mono', monospace; }
    .step-input-text { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; }
    .step-dur { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 2px; }
    .filter-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-tab { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
    .filter-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(127,255,110,0.1); }
    #toast { position: fixed; bottom: 30px; right: 30px; z-index: 999; background: var(--surface); border: 1px solid var(--accent); border-radius: 10px; padding: 12px 20px; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent); box-shadow: 0 8px 32px rgba(0,0,0,0.4); transform: translateY(20px); opacity: 0; transition: all 0.3s; pointer-events: none; }
    #toast.show { transform: translateY(0); opacity: 1; }
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; grid-template-rows: auto auto auto; padding: 20px; } .tasks-panel { grid-column: 1; grid-row: 3; } }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">Task<span>Autopilot</span></div>
    </div>
    <div class="header-meta">
      <span><span class="status-dot"></span>CONNECTED</span>
      <span>localhost:8000</span>
    </div>
  </header>

  <main>
    <div class="submit-panel">
      <div class="panel-label">// new task</div>
      <div class="goal-form">
        <textarea class="goal-input" id="goal-input" placeholder="Enter a natural language goal... e.g. Find top 3 Python frameworks and write a comparison report" rows="2"></textarea>
        <button class="submit-btn" id="submit-btn" onclick="submitTask()">RUN →</button>
      </div>
    </div>

    <div class="stream-panel">
      <div class="panel-header">
        <div class="panel-label">// live stream</div>
        <div id="active-task-id" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)"></div>
      </div>
      <div class="stream-box" id="stream-box">
        <div class="stream-empty" id="stream-empty">
          <div class="stream-empty-icon">◎</div>
          <div class="stream-empty-text">Submit a goal to see live execution</div>
        </div>
      </div>
    </div>

    <div class="tasks-panel">
      <div class="panel-header">
        <div class="panel-label">// all tasks</div>
        <button onclick="loadTasks(currentFilter)" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;font-family:'Space Mono',monospace">↻ refresh</button>
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterTasks(this, '')">ALL</button>
        <button class="filter-tab" onclick="filterTasks(this, 'running')">RUNNING</button>
        <button class="filter-tab" onclick="filterTasks(this, 'completed')">DONE</button>
        <button class="filter-tab" onclick="filterTasks(this, 'failed')">FAILED</button>
      </div>
      <div class="tasks-list" id="tasks-list">
        <div class="tasks-empty">No tasks yet</div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
  const BASE_URL = 'http://localhost:8000';
  let currentFilter = '';
  let activeEventSource = null;
  let activeTaskId = null;

  async function submitTask() {
    const goal = document.getElementById('goal-input').value.trim();
    if (!goal) { showToast('Please enter a goal'); return; }
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'SENDING...';
    try {
      const res = await fetch(`${BASE_URL}/tasks`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ goal }) });
      if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Failed'); }
      const data = await res.json();
      document.getElementById('goal-input').value = '';
      showToast(`Task created: ${data.task_id.slice(0,8)}...`);
      loadTasks(currentFilter);
      startStream(data.task_id);
    } catch (e) { showToast('Error: ' + e.message, true); }
    finally { btn.disabled = false; btn.textContent = 'RUN →'; }
  }

  function startStream(taskId) {
    if (activeEventSource) { activeEventSource.close(); activeEventSource = null; }
    activeTaskId = taskId;
    document.getElementById('active-task-id').textContent = `#${taskId.slice(0,8)}`;
    const box = document.getElementById('stream-box');
    box.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    const evtSrc = new EventSource(`${BASE_URL}/tasks/${taskId}/stream`);
    activeEventSource = evtSrc;
    evtSrc.onmessage = (e) => {
      const event = JSON.parse(e.data);
      renderStreamEvent(event, box);
      if (['done','completed','failed','cancelled'].includes(event.type)) { evtSrc.close(); loadTasks(currentFilter); }
    };
    evtSrc.onerror = () => { evtSrc.close(); loadTasks(currentFilter); };
  }

  function renderStreamEvent(event, box) {
    const typing = box.querySelector('.typing'); if (typing) typing.remove();
    const empty = box.querySelector('.stream-empty'); if (empty) empty.remove();
    if (event.type === 'heartbeat' || event.type === 'done') return;
    const div = document.createElement('div');
    const statusKey = event.status || event.type || 'planning';
    div.className = `event event-${statusKey}`;
    let html = `<div class="event-header"><span class="event-tag event-tag-${statusKey}">${statusKey.toUpperCase()}</span>`;
    if (event.step) html += `<span class="event-step">STEP ${event.step}</span>`;
    if (event.duration_ms !== undefined) html += `<span class="event-duration">${event.duration_ms}ms</span>`;
    html += `</div>`;
    if (event.tool) html += `<div class="event-tool">${event.tool}</div>`;
    if (event.input) html += `<div class="event-input">↳ ${event.input.slice(0,120)}${event.input.length>120?'...':''}</div>`;
    if (event.output) html += `<div class="event-output">${event.output.slice(0,200)}${event.output.length>200?'...':''}</div>`;
    if (event.message) html += `<div class="event-message">${event.message}</div>`;
    if (event.error) html += `<div class="event-error">✕ ${event.error}</div>`;
    if (event.cached) html += `<div class="event-duration">💾 cached</div>`;
    div.innerHTML = html;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  async function loadTasks(status = '') {
    try {
      const url = status ? `${BASE_URL}/tasks?status=${status}` : `${BASE_URL}/tasks`;
      const res = await fetch(url);
      if (!res.ok) return;
      const data = await res.json();
      renderTasks(data.tasks || []);
    } catch (e) {}
  }

  function renderTasks(tasks) {
    const list = document.getElementById('tasks-list');
    if (!tasks.length) { list.innerHTML = '<div class="tasks-empty">No tasks yet</div>'; return; }
    list.innerHTML = tasks.map(task => {
      const isActive = task.task_id === activeTaskId;
      const stepsCount = task.steps ? task.steps.length : 0;
      const doneCount = task.steps ? task.steps.filter(s => s.status === 'done').length : 0;
      const date = new Date(task.created_at).toLocaleTimeString();
      let stepsHtml = '';
      if (task.steps && task.steps.length > 0) {
        stepsHtml = `<div class="steps-section">` +
          task.steps.slice(0,4).map(s => `
            <div class="step-row">
              <div class="step-num step-num-${s.status}">${s.step_number}</div>
              <div class="step-info">
                <div class="step-tool">${s.tool_name}</div>
                <div class="step-input-text">${(s.input||'').slice(0,60)}${(s.input||'').length>60?'...':''}</div>
                ${s.duration_ms ? `<div class="step-dur">${s.duration_ms}ms</div>` : ''}
              </div>
            </div>`).join('') +
          (task.steps.length > 4 ? `<div style="font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;padding:6px 0">+${task.steps.length-4} more steps</div>` : '') +
          `</div>`;
      }
      const cancelBtn = (task.status === 'running' || task.status === 'planning')
        ? `<button class="cancel-btn" onclick="cancelTask(event,'${task.task_id}')">CANCEL</button>` : '';
      return `
        <div class="task-item ${isActive?'active':''}" onclick="viewTask('${task.task_id}')">
          <div class="task-item-header">
            <span class="task-status-badge badge-${task.status}">${task.status}</span>
            ${cancelBtn}
          </div>
          <div class="task-goal">${task.goal}</div>
          <div class="task-meta">
            <span class="task-id-short">#${task.task_id.slice(0,8)}</span>
            <span>${date}</span>
            ${stepsCount > 0 ? `<span>${doneCount}/${stepsCount} steps</span>` : ''}
          </div>
          ${stepsHtml}
        </div>`;
    }).join('');
  }

 async function viewTask(taskId) {
    try {
      const res = await fetch(`${BASE_URL}/tasks/${taskId}`);
      const task = await res.json();

      activeTaskId = taskId;
      document.getElementById('active-task-id').textContent = `#${taskId.slice(0,8)}`;

      const box = document.getElementById('stream-box');
      box.innerHTML = '';

      // If still running — open live stream
      if (['running', 'planning', 'queued'].includes(task.status)) {
        startStream(taskId);
        return;
      }

      // Task is done — render steps directly from task detail
      if (!task.steps || task.steps.length === 0) {
        box.innerHTML = `<div class="stream-empty">
          <div class="stream-empty-icon">◎</div>
          <div class="stream-empty-text">No steps recorded yet</div>
        </div>`;
        loadTasks(currentFilter);
        return;
      }

      // Render each step as a stream event card
      task.steps.forEach(s => {
        renderStreamEvent({
          step: s.step_number,
          tool: s.tool_name,
          input: s.input,
          output: s.output,
          status: s.status,
          duration_ms: s.duration_ms,
          attempt: s.attempt
        }, box);
      });

      // Render final status event
      if (task.status === 'completed') {
        renderStreamEvent({ type: 'completed', message: 'Task completed successfully' }, box);
      } else if (task.status === 'failed') {
        renderStreamEvent({ type: 'failed', error: task.error || 'Task failed' }, box);
      } else if (task.status === 'cancelled') {
        renderStreamEvent({ type: 'cancelled', message: 'Task was cancelled' }, box);
      }

      // Scroll to top to see from step 1
      box.scrollTop = 0;

      loadTasks(currentFilter);

    } catch(e) {
      showToast('Failed to load task', true);
    }
  }
  async function cancelTask(e, taskId) {
    e.stopPropagation();
    try {
      const res = await fetch(`${BASE_URL}/tasks/${taskId}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('Failed to cancel');
      showToast('Task cancelled');
      loadTasks(currentFilter);
    } catch (err) { showToast('Cancel failed: ' + err.message, true); }
  }

  function filterTasks(btn, status) {
    currentFilter = status;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    loadTasks(status);
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor = isError ? 'var(--failed)' : 'var(--accent)';
    t.style.color = isError ? 'var(--failed)' : 'var(--accent)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  document.getElementById('goal-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitTask(); }
  });

  setInterval(() => loadTasks(currentFilter), 5000);
  loadTasks();
</script>
</body>
</html>
